spring:
  datasource:
    url: "jdbc:h2:mem:bookhub;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;INIT=CREATE DOMAIN IF NOT EXISTS TIMESTAMPTZ AS TIMESTAMP WITH TIME ZONE"
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console

app:
  telegram:
    enabled: ${APP_TELEGRAM_ENABLED:true}
    bot-token: ${TELEGRAM_BOT_TOKEN:}
